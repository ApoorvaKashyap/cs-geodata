# Descriptor for the tehsil static boundaries dataset.
#
# Source: CoreStack S3 — Pan India tehsil boundary GeoParquet.
# Resolution: static (no temporal columns).
# Partitioned by state for manageable per-state GeoParquet files.
#
# First-milestone target:
#   tehsil/static.geoparquet  (partitioned by state)

entity       = "tehsil"
key          = "tehsil_id"
geometry     = "geometry"
partition_by = "state"

[[layers]]
name       = "boundaries"
resolution = "static"
stac_item  = "https://geoserver.core-stack.org:8443/geoserver/stac/collections/tehsil_wise/items/tehsil_boundaries"

[layers.rename]
TEHSIL   = "tehsil_id"
District = "district"
STATE    = "state"
